<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QUIZ COPA DO MUNDO 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Oswald:wght@400;600;700&display=swap');
 
  :root {
    --verde:    #99ffcc;
    --verde2:   #66ffcc;
    --cinza:    #cccccc;
    --branco:   #ffffff;
    --escuro:   #1a1a1a;
    --amarelo:  #ffe066;
    --vermelho: #ff4444;
    --azul:     #4488ff;
    --verde-btn:#44cc88;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Oswald', sans-serif;
    background: #111;
    color: var(--escuro);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
 
  .tela { display: none; width: 100%; max-width: 900px; min-height: 560px; }
  .tela.ativa { display: flex; }
 
  /* ═══ TELA 1 – MENU ═══ */
  #tela-menu {
    background: var(--verde);
    border: 3px solid #555;
    flex-direction: row;
    animation: fadeIn .3s ease;
  }
  .menu-esq {
    width: 320px; min-width: 320px;
    background: var(--verde);
    padding: 40px 30px;
    display: flex; flex-direction: column;
    border-right: 2px solid #aaa;
  }
  .menu-dir {
    flex: 1;
    background: var(--cinza);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .titulo-jogo {
    font-family: 'Oswald', sans-serif;
    font-size: 22px; font-weight: 700;
    color: var(--escuro);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }
  .label-jogar {

  }
  .btn-menu {
    background: var(--cinza);
    border: 2px outset #999;
    font-family: 'Oswald', sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 14px 10px;
    margin-bottom: 14px;
    cursor: pointer;
    letter-spacing: 1px;
    width: 100%;
    transition: background .15s, transform .1s;
  }
  .btn-menu:hover { background: #bbb; transform: scale(1.02); }
  .btn-menu:active { border-style: inset; }
  .btn-exit {
    background: var(--cinza);
    border: 2px outset #999;
    font-family: 'Oswald', sans-serif;
    font-size: 13px; font-weight: 700;
    padding: 10px; width: 100%;
    cursor: pointer; margin-top: 8px;
    transition: background .15s;
  }
  .btn-exit:hover { background: #bbb; }
  .rodape-menu {
    margin-top: auto;
    display: flex; justify-content: space-between;
    font-size: 11px; font-weight: 700; padding-top: 20px;
  }
  .rank-titulo {
    font-family: 'Oswald', sans-serif;
    font-size: 15px; font-weight: 700;
    text-align: center; margin-bottom: 12px;
  }
  .rank-row {
    display: flex; align-items: center;
    padding: 5px 4px;
    border-bottom: 1px solid #bbb;
    font-size: 13px;
  }
  .rank-num { font-size: 16px; font-weight: 700; width: 28px; }
  .rank-nome { flex: 1; }
  .rank-pts { font-weight: 700; font-size: 14px; color: var(--escuro); }
  .rank-pts-label { font-size: 13px; font-weight: 700; margin-right: 4px; }
 
  /* ═══ TELA 2 – CADASTRO ═══ */
  #tela-cadastro {
    background: var(--verde);
    border: 3px solid #555;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn .3s ease;

  }
  .cadastro-box {
    background: var(--verde);
    padding: 50px 60px;
    width: 100%; max-width: 500px;
    text-align: center;
  }
  .cadastro-titulo {
    font-size: 28px; font-weight: 700;
    margin-bottom: 40px; letter-spacing: 2px;
    color: var(--escuro);
  }
  .campo-jogador {
    display: flex; align-items: center;
    margin-bottom: 20px; gap: 10px;
  }
  .campo-label {
    font-size: 15px; font-weight: 700;
    width: 110px; text-align: right;
    white-space: nowrap;
  }
  .campo-input {
    flex: 1;
    border: 2px inset #999;
    background: #fff;

  .campo-input:focus { border-color: #444; }
  .cadastro-btns {
    display: flex; justify-content: center;
    gap: 20px; margin-top: 40px;
  }
  .btn-cadastro {
    background: var(--cinza);

    transition: background .15s, transform .1s;

  }
  .btn-cadastro:hover { background: #bbb; transform: scale(1.03); }
  .btn-cadastro:active { border-style: inset; }
 
  /* ═══ TELA 3 – JOGO ═══ */
  #tela-jogo {
    flex-direction: row;
    border: 3px solid #555;
    animation: fadeIn .25s ease;
  }
  .jogo-area {
    flex: 1;
    background: var(--verde2);
    padding: 0;
    display: flex; flex-direction: column;
  }
  .jogo-header {
    display: flex; align-items: center;

    background: var(--verde2);

  .jogo-tempo {
    font-size: 20px; font-weight: 700;
    font-family: 'Oswald', sans-serif;

  }
  .jogo-tempo.urgente { color: var(--vermelho); animation: pisca .5s infinite; }
  .jogo-pergunta-box {
    background: var(--branco);
    border: 3px inset #999;
    margin: 18px 18px 8px;
    padding: 16px 18px;
    min-height: 90px;
    font-size: 15px; font-weight: 700;
    line-height: 1.5;
    display: flex; align-items: center;

  .btn-alt:hover:not(:disabled) { background: #bbb; transform: scale(1.02); }

    border: 2px outset #999;

  .placar-top {
    background: var(--cinza);

  .placar-titulo {
    font-size: 22px; font-weight: 700;

    font-size: 16px; font-weight: 700;
    font-family: 'Oswald', sans-serif;
  }
  .placar-pts-val {

    color: #333;
  }
  .placar-turno {
    background: var(--amarelo);

  .placar-bottom {
    background: var(--verde2);
    padding: 10px 12px;
    border-left: 2px solid #999;
    border-top: 1px solid #999;
    min-height: 60px;

  /* Indicador de som */
  .som-toggle {
    background: transparent;
    border: 2px outset #999;
    font-family: 'Oswald', sans-serif;
    font-size: 13px; font-weight: 700;

  /* ═══ TELA 4 – VITÓRIA ═══ */
  #tela-vitoria {
    background: var(--verde);
    border: 3px solid #555;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  .vitoria-box {
    padding: 40px 60px;
    width: 100%;
    text-align: left;
    max-width: 560px;
  }
  .vitoria-grito {
    font-size: 20px; font-weight: 700;
    font-family: 'Oswald', sans-serif;

  .vitoria-linha {

  .vitoria-rotulo {

  .vitoria-valor {
    font-size: 20px; font-weight: 600;
    font-family: 'Oswald', sans-serif;
    color: #222;
  }
  .vitoria-separador { width: 100%; height: 2px; background: #aaa; margin: 18px 0; }
  .vitoria-resultado {
    font-size: 26px; font-weight: 700;
    font-family: 'Oswald', sans-serif;
    text-align: center;
    padding: 16px;
    margin-bottom: 20px;
    background: var(--amarelo);
    border: 3px solid #999;
    letter-spacing: 2px;
    animation: pulse 1s ease infinite alternate;
  }
  .vitoria-btns {
    display: flex; gap: 20px; margin-top: 30px; justify-content: center;
  }
  .btn-vitoria {
    background: var(--cinza);
    border: 3px outset #999;
    font-family: 'Oswald', sans-serif;
    font-size: 17px; font-weight: 700;
    padding: 12px 28px; cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: 1px;
  }
  .btn-vitoria:hover { background: #bbb; transform: scale(1.04); }
  .btn-vitoria:active { border-style: inset; }
 
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  @keyframes pisca { 0%,100% { opacity:1; } 50% { opacity:.3; } }
  @keyframes pulse { from { transform:scale(1); } to { transform:scale(1.02); } }
</style>

<body>
 
<!-- TELA 1: MENU -->
<div id="tela-menu" class="tela ativa">
  <div class="menu-esq">

<!-- TELA 4: VITÓRIA -->
<div id="tela-vitoria" class="tela">
  <div class="vitoria-box">
    <div class="vitoria-grito" id="v-grito">BIXO SABIDO DA PÊ!</div>

      <div class="vitoria-separador"></div>

      <button class="btn-vitoria" onclick="jogarNovamente()">JOGAR NOVAMENTE</button>

<script>
// ══════════════════════════════════════════════════════
//  SISTEMA DE SOM — Web Audio API
//  Todos os sons gerados via síntese, sem arquivos externos
// ══════════════════════════════════════════════════════
let audioCtx = null;
let somAtivo = true;
let bgNode = null;      // nó da música de fundo
let bgGain = null;      // ganho da música de fundo
let tiqueTaqueInterval = null;
 
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
 
function toggleSom() {
  somAtivo = !somAtivo;
  document.getElementById('btn-som').textContent = somAtivo ? '🔊' : '🔇';
  if (!somAtivo) {
    pararBgMusic();
    pararTiqueTaque();
  }
}
 
// ── Utilitários de síntese ──────────────────────────
 
function beep(freq, tipo, duracao, volume, delay, ctx) {
  const c = ctx || getCtx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.connect(gain);
  gain.connect(c.destination);
  osc.type = tipo || 'sine';
  osc.frequency.setValueAtTime(freq, c.currentTime + (delay||0));
  gain.gain.setValueAtTime(volume||0.3, c.currentTime + (delay||0));
  gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + (delay||0) + duracao);
  osc.start(c.currentTime + (delay||0));
  osc.stop(c.currentTime + (delay||0) + duracao + 0.05);
}
 
function nota(freq, inicio, duracao, vol, tipo, ctx) {
  const c = ctx || getCtx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.connect(gain);
  gain.connect(c.destination);
  osc.type = tipo || 'square';
  osc.frequency.setValueAtTime(freq, c.currentTime + inicio);
  gain.gain.setValueAtTime(vol || 0.2, c.currentTime + inicio);
  gain.gain.setValueAtTime(vol || 0.2, c.currentTime + inicio + duracao * 0.8);
  gain.gain.linearRampToValueAtTime(0.001, c.currentTime + inicio + duracao);
  osc.start(c.currentTime + inicio);
  osc.stop(c.currentTime + inicio + duracao + 0.02);
}
 
// ── 1. Som de CLIQUE no botão ──────────────────────
function somClique() {
  if (!somAtivo) return;
  const c = getCtx();
  beep(440, 'square', 0.06, 0.15, 0, c);
  beep(660, 'square', 0.05, 0.10, 0.06, c);
}
 
// ── 2. Música de fundo SUSPENSE (loop) ────────────
// Sequência de notas tensas, estilo "Jogo do Milhão"
function iniciarBgMusic() {
  if (!somAtivo) return;
  pararBgMusic();
  const c = getCtx();
 
  // Cria um nó de ganho mestre para a BG
  bgGain = c.createGain();
  bgGain.gain.setValueAtTime(0.18, c.currentTime);
  bgGain.connect(c.destination);
 
  // Sequência melódica em loop (notas tensas)
  const seq = [
    [220, 0.18], [246.94, 0.18], [261.63, 0.18], [246.94, 0.18],
    [220, 0.36], [196, 0.18], [220, 0.18],
    [233.08, 0.18], [246.94, 0.18], [261.63, 0.18], [246.94, 0.18],
    [233.08, 0.36], [220, 0.36]
  ];
 
  const duracaoTotal = seq.reduce((s, n) => s + n[1], 0);
 
  function tocarLoop() {
    if (!bgGain) return;
    let t = 0;
    seq.forEach(([freq, dur]) => {
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.connect(g);
      g.connect(bgGain);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, c.currentTime + t);
      g.gain.setValueAtTime(0.5, c.currentTime + t);
      g.gain.linearRampToValueAtTime(0.001, c.currentTime + t + dur * 0.85);
      osc.start(c.currentTime + t);
      osc.stop(c.currentTime + t + dur);
      t += dur;
    });
    // Agendar próximo loop
    bgLoopTimeout = setTimeout(tocarLoop, duracaoTotal * 1000 + 200);
  }
 
  tocarLoop();
}
 
let bgLoopTimeout = null;
 
function pararBgMusic() {
  if (bgLoopTimeout) { clearTimeout(bgLoopTimeout); bgLoopTimeout = null; }
  if (bgGain) {
    try { bgGain.gain.linearRampToValueAtTime(0.001, getCtx().currentTime + 0.3); } catch(e){}
    bgGain = null;
  }
}
 
// ── 3. Tique-taque (últimos 6 segundos) ────────────
function iniciarTiqueTaque() {
  if (!somAtivo) return;
  pararTiqueTaque();
  // Para a música de fundo e inicia o tique-taque
  pararBgMusic();
 
  tiqueTaqueInterval = setInterval(() => {
    if (!somAtivo) return;
    const c = getCtx();
 
    // Tique: som agudo curto
    const osc1 = c.createOscillator();
    const g1 = c.createGain();
    osc1.connect(g1); g1.connect(c.destination);
    osc1.type = 'square';
    osc1.frequency.setValueAtTime(880, c.currentTime);
    g1.gain.setValueAtTime(0.4, c.currentTime);
    g1.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
    osc1.start(c.currentTime);
    osc1.stop(c.currentTime + 0.1);
 
    // Taue: som grave no meio do intervalo (0.5s depois)
    setTimeout(() => {
      if (!somAtivo) return;
      const c2 = getCtx();
      const osc2 = c2.createOscillator();
      const g2 = c2.createGain();
      osc2.connect(g2); g2.connect(c2.destination);
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(660, c2.currentTime);
      g2.gain.setValueAtTime(0.3, c2.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.001, c2.currentTime + 0.07);
      osc2.start(c2.currentTime);
      osc2.stop(c2.currentTime + 0.09);
    }, 500);
  }, 1000);
}
 
function pararTiqueTaque() {
  if (tiqueTaqueInterval) { clearInterval(tiqueTaqueInterval); tiqueTaqueInterval = null; }
}
 
// ── 4. Som de ACERTO ────────────────────────────────
// Fanfarra animada estilo "Jogo do Milhão"
function somAcerto() {
  if (!somAtivo) return;
  pararBgMusic();
  pararTiqueTaque();
  const c = getCtx();
 
  // Acordes ascendentes vitoriosos
  const fanfarra = [
    [523.25, 0.00, 0.12],  // C5
    [659.25, 0.10, 0.12],  // E5
    [783.99, 0.20, 0.12],  // G5
    [1046.5, 0.30, 0.25],  // C6
    [783.99, 0.52, 0.10],  // G5
    [1046.5, 0.60, 0.35],  // C6 (sustain)
  ];
 
  fanfarra.forEach(([freq, inicio, dur]) => {
    nota(freq, inicio, dur, 0.25, 'square', c);
    nota(freq * 1.5, inicio, dur * 0.6, 0.08, 'sine', c); // harmônico
  });
 
  // Rufada de tambor
  [0, 0.1, 0.2, 0.3].forEach(t => {
    const noise = c.createOscillator();
    const ngain = c.createGain();
    noise.connect(ngain); ngain.connect(c.destination);
    noise.type = 'sawtooth';
    noise.frequency.setValueAtTime(80 + Math.random()*40, c.currentTime + t);
    ngain.gain.setValueAtTime(0.15, c.currentTime + t);
    ngain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + t + 0.07);
    noise.start(c.currentTime + t);
    noise.stop(c.currentTime + t + 0.08);
  });
}
 
// ── 5. Som de ERRO ──────────────────────────────────
// Descida dramática, estilo "errou feio"
function somErro() {
  if (!somAtivo) return;
  pararBgMusic();
  pararTiqueTaque();
  const c = getCtx();
 
  // Descida de frequência dramática
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.connect(gain); gain.connect(c.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(440, c.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, c.currentTime + 0.8);
  gain.gain.setValueAtTime(0.35, c.currentTime);
  gain.gain.linearRampToValueAtTime(0.001, c.currentTime + 0.85);
  osc.start(c.currentTime);
  osc.stop(c.currentTime + 0.9);
 
  // Dissonância
  const osc2 = c.createOscillator();
  const g2 = c.createGain();
  osc2.connect(g2); g2.connect(c.destination);
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(466, c.currentTime);
  osc2.frequency.exponentialRampToValueAtTime(85, c.currentTime + 0.8);
  g2.gain.setValueAtTime(0.20, c.currentTime);
  g2.gain.linearRampToValueAtTime(0.001, c.currentTime + 0.85);
  osc2.start(c.currentTime);
  osc2.stop(c.currentTime + 0.9);
 
  // Batida grave de impacto
  const osc3 = c.createOscillator();
  const g3 = c.createGain();
  osc3.connect(g3); g3.connect(c.destination);
  osc3.type = 'sine';
  osc3.frequency.setValueAtTime(120, c.currentTime);
  osc3.frequency.exponentialRampToValueAtTime(40, c.currentTime + 0.3);
  g3.gain.setValueAtTime(0.4, c.currentTime);
  g3.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
  osc3.start(c.currentTime);
  osc3.stop(c.currentTime + 0.32);
}
 
// ── 6. Som de TEMPO ESGOTADO ────────────────────────
function somTempoEsgotado() {
  if (!somAtivo) return;
  pararTiqueTaque();
  const c = getCtx();
  // Buzzer longo
  [0, 0.25, 0.5].forEach((d, i) => {
    beep(220 - i*30, 'square', 0.18, 0.3, d, c);
  });
  beep(100, 'sawtooth', 0.4, 0.35, 0.7, c);
}
 
// ── 7. Jingle de VITÓRIA ────────────────────────────
function somVitoria() {
  if (!somAtivo) return;
  pararBgMusic();
  pararTiqueTaque();
  const c = getCtx();
 
  // Melodia de vitória estilo "Jogo do Milhão"
  const melodia = [
    [523, 0.00, 0.15],
    [523, 0.15, 0.10],
    [523, 0.27, 0.10],
    [659, 0.38, 0.35],
    [622, 0.75, 0.15],
    [587, 0.92, 0.15],
    [554, 1.09, 0.15],
    [587, 1.26, 0.50],
 
    [440, 1.80, 0.15],
    [466, 1.97, 0.15],
    [587, 2.14, 0.35],
    [523, 2.51, 0.15],
    [466, 2.68, 0.15],
    [440, 2.85, 0.15],
    [466, 3.02, 0.55],
  ];
 
  melodia.forEach(([freq, inicio, dur]) => {
    nota(freq, inicio, dur, 0.22, 'square', c);
    nota(freq, inicio + 0.01, dur, 0.08, 'sine', c);
  });
 
  // Baixo
  const baixo = [
    [130, 0.0, 0.3],[146, 0.5, 0.2],[164, 0.8, 0.3],
    [130, 1.8, 0.3],[146, 2.2, 0.2],[164, 2.6, 0.3],
  ];
  baixo.forEach(([freq, inicio, dur]) => {
    nota(freq, inicio, dur, 0.12, 'triangle', c);
  });
}
 
// ── 8. Som de EMPATE ────────────────────────────────
function somEmpate() {
  if (!somAtivo) return;
  pararBgMusic();
  const c = getCtx();
  // Melodia neutra/ambígua
  [[523,0,0.2],[466,0.2,0.2],[494,0.4,0.4]].forEach(([f,i,d]) => nota(f,i,d,0.2,'triangle',c));
}
 
// ══════════════════════════════════════════════════════
//  BANCO DE PERGUNTAS
// ══════════════════════════════════════════════════════
const BANCO = [
  { p: "Quais países sediam a Copa do Mundo 2026?", alts: ["Brasil, Argentina e Uruguai","Estados Unidos, Canadá e México","Estados Unidos e Canadá","México e Brasil"], c: 1 },

  { p: "Qual destes países participa da organização da Copa 2026?", alts: ["Brasil","Canadá","Argentina","Espanha"], c: 1 },

  { p: "Em qual cidade americana será disputada a final da Copa 2026?", alts: ["Nova York / New Jersey","Los Angeles","Chicago","São Francisco"], c: 0 },

  { p: "Em que ano foi realizada a primeira Copa do Mundo?", alts: ["1926","1930","1934","1938"], c: 1 },
  { p: "Qual seleção foi vice-campeã da Copa 2022?", alts: ["Brasil","Alemanha","França","Croácia"], c: 2 },
];
 
// ══════════════════════════════════════════════════════
//  ESTADO DO JOGO
// ══════════════════════════════════════════════════════
let modo2j = true;
let nomes  = ["",""];
let pontos = [0, 0];
let turno  = 0;
let usadas = new Set();
let ordemPerguntas = [];
let totalPorJogador = 10;
let respondidas = [0,0];
let temporizador = null;
let tempoRestante = 0;
let tiqueTaqueAtivo = false;
 
let ranking = JSON.parse(sessionStorage.getItem('rankingQuiz') || '[]');
 
function salvarRanking() { sessionStorage.setItem('rankingQuiz', JSON.stringify(ranking)); }
 
function adicionarAoRanking(nome, pts) {
  ranking.push({ nome, pts });
  ranking.sort((a,b) => b.pts - a.pts);
  if (ranking.length > 10) ranking = ranking.slice(0,10);
  salvarRanking();
}
 
function renderRanking() {
  const lista = document.getElementById('rank-lista');
  if (ranking.length === 0) {
    lista.innerHTML = '<div style="text-align:center;font-size:12px;margin-top:20px;font-family:Oswald">Nenhum jogador ainda</div>';
    return;
  }
  lista.innerHTML = ranking.map((r,i) => `
    <div class="rank-row">
      <span class="rank-num">${i+1}</span>
      <span class="rank-nome">${r.nome}</span>
      <span class="rank-pts-label">PONTOS:</span>
      <span class="rank-pts">${r.pts}</span>
    </div>
  `).join('');
}
 
// ══════════════════════════════════════════════════════
//  NAVEGAÇÃO
// ══════════════════════════════════════════════════════
function mostrarTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
}
 
function irParaMenu() {
  pararTimer();
  pararBgMusic();
  pararTiqueTaque();
  renderRanking();
  mostrarTela('tela-menu');
}
 
function irParaCadastro() {
  modo2j = true;
  document.getElementById('linha-j2').style.display = '';
  document.getElementById('lbl-j1').textContent = 'JOGADOR 1';
  document.getElementById('inp-j1').value = '';
  document.getElementById('inp-j2').value = '';
  mostrarTela('tela-cadastro');
}
 
function irParaCadastro1J() {
  modo2j = false;
  document.getElementById('linha-j2').style.display = 'none';
  document.getElementById('lbl-j1').textContent = 'JOGADOR 1';
  document.getElementById('inp-j1').value = '';
  document.getElementById('inp-j2').value = '';
  mostrarTela('tela-cadastro');
}
 
// ══════════════════════════════════════════════════════
//  INÍCIO DO JOGO
// ══════════════════════════════════════════════════════
function comecarJogo() {
  const n1 = document.getElementById('inp-j1').value.trim();
  const n2 = document.getElementById('inp-j2').value.trim();
  if (!n1) { alert('Digite o nome do Jogador 1!'); return; }
  if (modo2j && !n2) { alert('Digite o nome do Jogador 2!'); return; }
 
  nomes  = [n1 || 'JOGADOR 1', n2 || 'JOGADOR 2'];
  pontos = [0, 0];
  respondidas = [0, 0];
  turno  = 0;
  usadas = new Set();
  indicePerguntaGlobal = 0;
 
  ordemPerguntas = [...Array(BANCO.length).keys()].sort(() => Math.random() - .5);
 
  document.getElementById('pl-nome1').textContent = nomes[0].toUpperCase();
  document.getElementById('pl-pts1').textContent  = '0';
  if (modo2j) {
    document.getElementById('pl-j2-bloco').style.display = '';
    document.getElementById('pl-nome2').textContent = nomes[1].toUpperCase();
    document.getElementById('pl-pts2').textContent  = '0';
  } else {
    document.getElementById('pl-j2-bloco').style.display = 'none';
  }
 
  mostrarTela('tela-jogo');
  // Inicia música de fundo ao entrar no jogo
  iniciarBgMusic();
  carregarPergunta();
}
 
// ══════════════════════════════════════════════════════
//  LÓGICA DAS PERGUNTAS
// ══════════════════════════════════════════════════════
let indicePerguntaGlobal = 0;
 
function carregarPergunta() {
  tiqueTaqueAtivo = false;
  pararTiqueTaque();
 
  if (respondidas[turno] >= totalPorJogador) {
    if (modo2j && respondidas[1-turno] < totalPorJogador) {
      turno = 1 - turno;
      carregarPergunta();
    } else {
      fimDeJogo();
    }
    return;
  }
 
  // Retoma música de fundo se não estiver tocando
  if (somAtivo && !bgGain) iniciarBgMusic();
 
  let idx;
  while (true) {
    idx = ordemPerguntas[indicePerguntaGlobal % ordemPerguntas.length];
    indicePerguntaGlobal++;
    if (!usadas.has(idx)) { usadas.add(idx); break; }
    if (usadas.size >= BANCO.length) { usadas.clear(); }
  }
 
  const q = BANCO[idx];
  document.getElementById('jogo-pergunta').textContent = q.p;
  const ids = ['btn-A','btn-B','btn-C','btn-D'];
 
  const perm = [0,1,2,3].sort(() => Math.random() - .5);
  perm.forEach((origIdx, novoIdx) => {
    const btn = document.getElementById(ids[novoIdx]);
    btn.textContent = q.alts[origIdx];
    btn.className = 'btn-alt';
    btn.disabled = false;
    btn.dataset.correto = (origIdx === q.c) ? '1' : '0';
  });
 
  const acertos = pontos[turno] / 10;
  document.getElementById('jogo-dif').textContent = acertos >= 6 ? 'Difícil' : acertos >= 3 ? 'Média' : 'Fácil';
 
  document.getElementById('pl-turno').textContent =
    modo2j ? `VEZ DE ${nomes[turno].toUpperCase()}` : `VEZ DE ${nomes[0].toUpperCase()}`;
 
  document.getElementById('pl-rodada-info').innerHTML =
    `<span style="font-size:12px;font-weight:700;font-family:Oswald">${respondidas[turno]+1} / ${totalPorJogador}</span>`;
 
  iniciarTimer(30);
}
 
function responder(btnIdx) {
  pararTimer();
  pararBgMusic();
  pararTiqueTaque();
 
  // Som de clique ao selecionar
  somClique();
 
  const ids = ['btn-A','btn-B','btn-C','btn-D'];
  const btnClicado = document.getElementById(ids[btnIdx]);
  const correto = btnClicado.dataset.correto === '1';
 
  ids.forEach(id => document.getElementById(id).disabled = true);
  ids.forEach(id => {
    const b = document.getElementById(id);
    if (b.dataset.correto === '1') b.classList.add('certa');
  });
  if (!correto) btnClicado.classList.add('errada');
 
  // Sons de feedback com pequeno delay (para o clique ser ouvido)
  setTimeout(() => {
    if (correto) somAcerto();
    else somErro();
  }, 80);
 
  if (correto) {
    pontos[turno] += 10;
    document.getElementById(`pl-pts${turno+1}`).textContent = pontos[turno];
  }
 
  respondidas[turno]++;
 
  setTimeout(() => {
    if (modo2j) turno = 1 - turno;
    carregarPergunta();
  }, 1400);
}
 
// ══════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════
function iniciarTimer(seg) {
  tempoRestante = seg;
  tiqueTaqueAtivo = false;
  atualizarTimer();
  temporizador = setInterval(() => {
    tempoRestante--;
    atualizarTimer();
 
    // Inicia tique-taque nos últimos 6 segundos
    if (tempoRestante <= 6 && tempoRestante > 0 && !tiqueTaqueAtivo) {
      tiqueTaqueAtivo = true;
      iniciarTiqueTaque();
    }
 
    if (tempoRestante <= 0) {
      pararTimer();
      pararTiqueTaque();
      somTempoEsgotado();
 
      const ids = ['btn-A','btn-B','btn-C','btn-D'];
      ids.forEach(id => {
        const b = document.getElementById(id);
        b.disabled = true;
        if (b.dataset.correto === '1') b.classList.add('certa');
      });
      respondidas[turno]++;
      setTimeout(() => {
        if (modo2j) turno = 1 - turno;
        carregarPergunta();
      }, 1400);
    }
  }, 1000);
}
 
function pararTimer() {
  if (temporizador) { clearInterval(temporizador); temporizador = null; }
}
 
function atualizarTimer() {
  const el = document.getElementById('jogo-tempo');
  el.textContent = `Tempo: ${tempoRestante}`;
  el.className = 'jogo-tempo' + (tempoRestante <= 6 ? ' urgente' : '');
}
 
// ══════════════════════════════════════════════════════
//  FIM DE JOGO
// ══════════════════════════════════════════════════════
function fimDeJogo() {
  pararTimer();
  pararBgMusic();
  pararTiqueTaque();
 
  const pct = pontos[0] / (totalPorJogador * 10) * 100;
  let conhecimento;
  if (pct >= 80)      conhecimento = 'BIXO SABIDO DA PÊ!';
  else if (pct >= 50) conhecimento = 'CALMA AÊ NEYMAR!';
  else                conhecimento = 'TÁ FRACO EIN...';
 
  let resultado, grito;
  if (modo2j) {
    if (pontos[0] > pontos[1])      { resultado = `🏆 ${nomes[0].toUpperCase()} VENCEU!`; setTimeout(somVitoria, 200); }
    else if (pontos[1] > pontos[0]) { resultado = `🏆 ${nomes[1].toUpperCase()} VENCEU!`; setTimeout(somVitoria, 200); }
    else                             { resultado = '🤝 EMPATE!'; setTimeout(somEmpate, 200); }
 
    const maxPts = Math.max(pontos[0], pontos[1]);
    const pct2 = maxPts / (totalPorJogador * 10) * 100;
    if (pct2 >= 80)      grito = 'BIXO SABIDO DA PÊ!';
    else if (pct2 >= 50) grito = 'CALMA AÊ NEYMAR!';
    else                 grito = 'TÁ FRACO EIN...';
 
    document.getElementById('v-j2-bloco').style.display = '';
    document.getElementById('v-nome2').textContent = nomes[1];
    document.getElementById('v-pts2').textContent  = pontos[1];
  } else {
    resultado = 'FIM DE JOGO!';
    grito = conhecimento;
    setTimeout(somVitoria, 200);
    document.getElementById('v-j2-bloco').style.display = 'none';
  }
 
  document.getElementById('v-grito').textContent        = grito;
  document.getElementById('v-resultado').textContent    = resultado;
  document.getElementById('v-nome1').textContent        = nomes[0];
  document.getElementById('v-pts1').textContent         = pontos[0];
  document.getElementById('v-conhecimento').textContent = conhecimento;
 
  adicionarAoRanking(nomes[0], pontos[0]);
  if (modo2j) adicionarAoRanking(nomes[1], pontos[1]);
 
  mostrarTela('tela-vitoria');
}
 
// ══════════════════════════════════════════════════════
//  JOGAR NOVAMENTE
// ══════════════════════════════════════════════════════
function jogarNovamente() {
  if (modo2j) irParaCadastro();
  else        irParaCadastro1J();
}
 
// ══════════════════════════════════════════════════════
//  INICIALIZAÇÃO
// ══════════════════════════════════════════════════════
renderRanking();
</script>
